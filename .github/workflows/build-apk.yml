name: Build Jarvis APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build
    
    - name: Build APK
      run: ./gradlew assembleDebug
    
    - name: Upload APK to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Jarvis Android ${{ github.ref }}
        body: |
          ## 🎉 Jarvis Android Release
          
          **480 Upgrades** implementados!
          
          ### Download
          - [app-debug.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref }}/app-debug.apk)
          
          ### Funcionalidades
          - ✅ Reconhecimento de voz em português
          - ✅ Síntese de fala (TTS)
          - ✅ 30+ APIs integradas
          - ✅ Dashboard com estatísticas
          - ✅ Manager de módulos
          - ✅ Automações inteligentes
          - ✅ Interface holográfica roxo/ciano
          
          ### Como Instalar
          1. Baixe o APK
          2. Ative "Fontes desconhecidas" no Android
          3. Instale o APK
          4. Abra o Jarvis
          5. Clique no microfone e comece a falar!
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./app/build/outputs/apk/debug/app-debug.apk
        asset_name: app-debug.apk
        asset_content_type: application/vnd.android.package-archive
